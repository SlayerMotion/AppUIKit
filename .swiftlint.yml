# SwiftLint configuration. https://github.com/realm/SwiftLint
# A starting point; tune to your project, but keep it committed and run it with
# --strict so warnings cannot accumulate.

disabled_rules:
  - todo
  # The repository formats with SwiftFormat's `--commas always`, so trailing commas are intentional
  # and consistent; the lint rule that forbids them would only fight the formatter.
  - trailing_comma

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - sorted_first_last
  - unused_import

line_length:
  warning: 180
  error: 220
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  # Single-letter names that are standard in geometry and graphics math (points, axes, parameters).
  excluded:
    - a
    - b
    - c
    - d
    - h
    - i
    - p
    - r
    - s
    - t
    - u
    - v
    - w
    - x
    - y
    - dx
    - dy
    - tx
    - ty

type_name:
  min_length: 2

# A full SwiftUI editor view and the engine's drawing routines are legitimately long; these limits are
# raised from the defaults to fit a graphics editor while still catching runaway files.
large_tuple:
  warning: 4
file_length:
  warning: 700
  error: 1000
type_body_length:
  warning: 600
  error: 800
function_body_length:
  warning: 80
  error: 120
function_parameter_count:
  warning: 6
  error: 8

excluded:
  - .build
  - Packages/.build
  - .git
  - Apps/build
  - build
  - DerivedData
